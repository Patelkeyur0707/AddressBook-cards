{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Admin Management</h2>

<div class="bg-white p-6 rounded shadow">

<table class="w-full border rounded overflow-hidden">
<thead class="bg-gray-200">
<tr>
<th class="p-3">Username</th>
<th class="p-3">Email</th>
<th class="p-3">Status</th>
<th class="p-3 text-center">Actions</th>
</tr>
</thead>

<tbody>
{% for admin in admins %}
<tr class="border-t">

<td class="p-3">{{ admin.username }}</td>
<td class="p-3">{{ admin.email }}</td>
<td class="p-3 text-green-600">Admin</td>

<td class="p-3 text-center">

<a href="{% url 'edit_admin' admin.id %}"
   class="px-3 py-1 bg-yellow-400 text-white rounded">Edit</a>

<a href="{% url 'delete_admin' admin.id %}"
   class="px-3 py-1 bg-red-500 text-white rounded"
   onclick="return confirm('Are you sure?')">Delete</a>

</td>

</tr>
{% endfor %}
</tbody>

</table>

</div>

{% endblock %}

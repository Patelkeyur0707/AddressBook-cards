<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}AddressBook{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- MOBILE TOP BAR -->
<div class="md:hidden bg-blue-900 text-white p-4 flex justify-between items-center">
    <h1 class="font-bold text-lg">AddressBook</h1>
    <button onclick="toggleSidebar()">☰</button>
</div>

<div class="flex">

<!-- SIDEBAR -->
<div id="sidebar"
     class="w-64 bg-blue-900 text-white min-h-screen p-6 fixed md:static z-50 transform -translate-x-full md:translate-x-0 transition">

    <h1 class="text-2xl font-bold mb-8">AddressBook</h1>

    <nav class="space-y-3">

    <a href="/" class="block p-3 rounded hover:bg-blue-700">
        📊 Dashboard
    </a>

    <a href="/list/" class="block p-3 rounded hover:bg-blue-700">
        📋 List
    </a>

    <a href="/add/" class="block p-3 rounded hover:bg-blue-700">
        ➕ Add
    </a>

    <!-- NEW ADMIN LIST -->
    <a href="/admin/" target="_blank"
       class="block p-3 rounded hover:bg-blue-700">
        ⚙️ Admin Panel
    </a>

</nav>
</div>

<!-- MAIN -->
<div class="flex-1 p-4 md:p-8 w-full">

    {% block content %}{% endblock %}

</div>

</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("-translate-x-full");
}
</script>

</body>
</html>

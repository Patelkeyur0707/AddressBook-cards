<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}AddressBook{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- MOBILE TOP BAR -->
<div class="md:hidden bg-blue-900 text-white p-4 flex justify-between items-center">
    <h1 class="font-bold text-lg">AddressBook</h1>
    <button onclick="toggleSidebar()">☰</button>
</div>

<div class="flex">

<!-- SIDEBAR -->
<div id="sidebar"
     class="w-64 bg-blue-900 text-white min-h-screen p-6 fixed md:static z-50 transform -translate-x-full md:translate-x-0 transition">

    <h1 class="text-2xl font-bold mb-8">AddressBook</h1>

    <nav class="space-y-3">

        <a href="/" class="block p-3 rounded hover:bg-blue-700">
            📊 Dashboard
        </a>

        <a href="/list/" class="block p-3 rounded hover:bg-blue-700">
            📋 List
        </a>

        <a href="/add/" class="block p-3 rounded hover:bg-blue-700">
            ➕ Add
        </a>

        <a href="/admin/" target="_blank"
           class="block p-3 rounded hover:bg-blue-700">
            ⚙️ Admin Panel
        </a>

    </nav>
</div>

<!-- MAIN -->
<div class="flex-1 p-4 md:p-8 w-full">
    {% block content %}{% endblock %}
</div>

</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("-translate-x-full");
}
</script>

<!-- ================= POPUP SYSTEM ================= -->
{% if messages %}

<!-- CENTER POPUP -->
<div id="centerPopup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">

    <div style="
    background:white;
    padding:30px 40px;
    border-radius:12px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    ">

        <div style="font-size:40px;color:#22c55e;margin-bottom:10px;">✔</div>

        <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">
            Success!
        </h2>

        <p style="color:#6b7280;margin-bottom:20px;">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </p>

        <button onclick="showToast()" style="
        background:#3b82f6;
        color:white;
        padding:8px 18px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-weight:600;">
            OK
        </button>

    </div>
</div>

<!-- SIDE TOAST -->
<div id="toast" style="
position:fixed;
top:20px;
right:20px;
background:#4CAF50;
color:white;
padding:12px 18px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:9999;
font-size:14px;
display:none;
">
    {% for message in messages %}
        {{ message }}
    {% endfor %}
</div>

<script>
function showToast(){
    // hide center popup
    document.getElementById("centerPopup").style.display = "none";

    // show toast
    const toast = document.getElementById("toast");
    toast.style.display = "block";

    // auto hide
    setTimeout(()=>{
        toast.style.opacity = "0";
        setTimeout(()=> toast.remove(), 500);
    }, 3000);
}
</script>

{% endif %}
<!-- ================= END ================= -->

</body>
</html>

{% extends 'base.html' %}

{% block title %}List{% endblock %}

{% block content %}

<!-- HEADER -->
<div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-3">

<h1 class="text-2xl font-bold">Contacts</h1>

<form method="GET" class="flex w-full md:w-80">
<input type="text" name="q" value="{{ request.GET.q }}"
placeholder="Search company..."
class="w-full px-3 py-2 border rounded-l">
<button class="bg-blue-600 text-white px-4 rounded-r">Search</button>
</form>

</div>

<!-- TABLE -->
<div class="overflow-x-auto bg-white rounded-xl shadow">

<table class="min-w-full text-sm text-left">

<thead class="bg-gray-100">
<tr>
<th class="p-3 text-center">Company</th>
<th class="p-3 text-center">Owner</th>
<th class="p-3 text-center">CEO</th>
<th class="p-3 text-center">Manager</th>
<th class="p-3 text-center">Front</th>
<th class="p-3 text-center">Back</th>
<th class="p-3 text-center">QR</th>
<th class="p-3 text-center">Actions</th>
</tr>
</thead>

<tbody id="table-body">
{% include "partials/contact_table.html" %}
</tbody>

</table>

</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">

<div class="bg-white p-6 rounded-xl w-80 text-center">
<h2 class="font-bold mb-3">Confirm Delete</h2>
<p class="mb-4 text-gray-600">Are you sure?</p>

<div class="flex justify-center gap-3">
<button onclick="closeModal()" class="bg-gray-300 px-4 py-2 rounded">Cancel</button>
<a id="deleteLink" class="bg-red-500 text-white px-4 py-2 rounded">Delete</a>
</div>

</div>
</div>

<!-- JS -->
<script>

// DELETE MODAL
function confirmDelete(id){
document.getElementById("deleteModal").classList.remove("hidden");
document.getElementById("deleteModal").classList.add("flex");
document.getElementById("deleteLink").href=`/delete/${id}/`;
}

function closeModal(){
document.getElementById("deleteModal").classList.add("hidden");
document.getElementById("deleteModal").classList.remove("flex");
}

// LIVE SEARCH
const searchInput = document.querySelector("input[name='q']");
let timeout = null;

searchInput.addEventListener("keyup", function(){

clearTimeout(timeout);

timeout = setTimeout(() => {
fetch(`/list/?q=${searchInput.value}`, {
headers: { "X-Requested-With": "XMLHttpRequest" }
})
.then(res => res.json())
.then(data => {
document.getElementById("table-body").innerHTML = data.html;
});
}, 300);

});

</script>

{% endblock %}

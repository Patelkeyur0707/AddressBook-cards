<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}AddressBook{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
#sidebar {
    transition: all 0.3s ease;
}
</style>

</head>

<body class="bg-gray-100">

<!-- MOBILE HEADER -->
<div class="md:hidden bg-blue-900 text-white p-4 flex justify-between items-center shadow">
    <h1 class="font-bold text-lg">AddressBook</h1>
    <button onclick="toggleSidebar()" class="text-xl">☰</button>
</div>

<div class="flex">

<!-- OVERLAY -->
<div id="overlay" onclick="toggleSidebar()"
     class="fixed inset-0 bg-black bg-opacity-50 hidden z-40 md:hidden"></div>

<!-- SIDEBAR -->
<div id="sidebar"
     class="w-64 bg-blue-900 text-white min-h-screen p-6 fixed md:static z-50 transform -translate-x-full md:translate-x-0 flex flex-col shadow-lg">

    <h1 class="text-2xl font-bold mb-8 tracking-wide">AddressBook</h1>

    <nav class="space-y-2">

        <!-- ✅ DASHBOARD -->
        <a href="{% url 'dashboard' %}"
           class="block p-3 rounded hover:bg-blue-700 transition">
           📊 Dashboard
        </a>

        <!-- ✅ CONTACT LIST -->
        <a href="{% url 'list' %}"
           class="block p-3 rounded hover:bg-blue-700 transition">
           📋 Contacts
        </a>

        <!-- ✅ ADD CONTACT -->
        <a href="{% url 'add' %}"
           class="block p-3 rounded hover:bg-blue-700 transition">
           ➕ Add Contact
        </a>

        {% if request.user.is_staff %}
        <a href="{% url 'admin_list' %}"
           class="block p-3 rounded hover:bg-blue-700 transition">
           🛠 Admin Panel
        </a>
        {% endif %}

    </nav>

    <!-- LOGOUT -->
    <div class="mt-auto pt-6">
        <a href="{% url 'logout' %}"
           class="block p-3 rounded bg-red-600 hover:bg-red-700 text-center font-semibold transition">
            🚪 Logout
        </a>
    </div>

</div>

<!-- MAIN -->
<div class="flex-1 p-4 md:p-8 w-full">
    {% block content %}{% endblock %}
</div>

</div>

<script>
function toggleSidebar(){
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");
}
</script>

</body>
</html>
